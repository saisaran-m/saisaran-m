<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="40%" stop-color="#05030f"/>
      <stop offset="80%" stop-color="#010005"/>
      <stop offset="100%" stop-color="#08001a"/>
    </linearGradient>
    
    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="1.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f2fe" stroke-width="0.75" stroke-opacity="0.12"/>
    </pattern>

    <!-- Main Title Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="35%" stop-color="#4facfe"/>
      <stop offset="70%" stop-color="#bd00ff"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>

    <!-- Subtitle/Line Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#bd00ff"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>

    <!-- Grid Fade Mask -->
    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="40%" stop-color="black" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="800" height="300" fill="url(#maskGrad)"/>
    </mask>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');

    @keyframes moveGrid {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      50% { transform: translateY(-20px) translateX(15px); opacity: 0.9; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    
    .grid-bg {
      animation: moveGrid 2.5s linear infinite;
    }
    .main-title {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 54px;
      fill: url(#textGrad);
      filter: url(#glow);
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 6px;
      opacity: 0.9;
    }
    .badge-text {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 10px;
      fill: #00f2fe;
      letter-spacing: 3px;
    }
    .line {
      stroke: url(#accentGrad);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 800;
      animation: drawLine 2s ease-out forwards;
    }
    .slogan {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      font-size: 12.5px;
      fill: #94a3b8;
      letter-spacing: 1.5px;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Moving Grid (Masked) -->
  <rect width="100%" height="100%" fill="url(#grid)" mask="url(#gridMask)" class="grid-bg"/>

  <!-- Neon Accent Line -->
  <line x1="100" y1="215" x2="700" y2="215" class="line"/>

  <!-- Content Group -->
  <g transform="translate(400, 135)" text-anchor="middle">
    <!-- Top badge -->
    <g transform="translate(0, -90)">
      <rect x="-110" y="-12" width="220" height="24" rx="12" fill="#140b2e" stroke="#bd00ff" stroke-width="1.5" style="animation: pulseGlow 4s infinite;"/>
      <text y="4" class="badge-text">FULL STACK DEVELOPER</text>
    </g>

    <!-- Main Name -->
    <text y="-10" class="main-title">SAISARAN M</text>
    
    <!-- Subtitle Role -->
    <text y="42" class="subtitle">FULL STACK ENGINEER</text>

    <!-- Bio Slogan -->
    <text y="68" class="slogan">Architecting scalable backends • Crafting immersive frontends</text>
  </g>

  <!-- Particle Stars (Animated) -->
  <circle cx="80" cy="60" r="3" fill="#00f2fe" style="animation: floatParticle 8s ease-in-out infinite;"/>
  <circle cx="730" cy="70" r="2" fill="#bd00ff" style="animation: floatParticle 10s ease-in-out infinite 1s;"/>
  <circle cx="150" cy="250" r="2.5" fill="#ff007f" style="animation: floatParticle 7s ease-in-out infinite 2s;"/>
  <circle cx="650" cy="240" r="2.2" fill="#00f2fe" style="animation: floatParticle 9s ease-in-out infinite 0.5s;"/>
  <circle cx="320" cy="40" r="1.5" fill="#ffffff" style="animation: floatParticle 12s ease-in-out infinite 3s;"/>
  <circle cx="480" cy="50" r="2" fill="#bd00ff" style="animation: floatParticle 11s ease-in-out infinite 1.5s;"/>
</svg>
