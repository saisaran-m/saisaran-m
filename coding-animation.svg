<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="desk-glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0a051b" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neon-cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0088ff" />
    </linearGradient>
    <linearGradient id="neon-pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#bd00ff" />
    </linearGradient>
    
    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes float-up {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }
    @keyframes float-down {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(6px) rotate(-2deg); }
    }
    @keyframes scroll-code-1 {
      0% { stroke-dashoffset: 120; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scroll-code-2 {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 120; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes steam-rise {
      0% { transform: translateY(0) scaleX(1); opacity: 0; }
      40% { transform: translateY(-4px) scaleX(1.3); opacity: 0.6; }
      80% { transform: translateY(-9px) scaleX(0.8); opacity: 0.2; }
      100% { transform: translateY(-12px) scaleX(0.5); opacity: 0; }
    }
    
    .glow-cyan { filter: url(#glow-cyan); }
    .glow-pink { filter: url(#glow-pink); }
    .float-1 { animation: float-up 5s ease-in-out infinite; }
    .float-2 { animation: float-down 5.5s ease-in-out infinite; }
    .code-scroll-1 { stroke-dasharray: 25 95; animation: scroll-code-1 7s linear infinite; }
    .code-scroll-2 { stroke-dasharray: 35 85; animation: scroll-code-2 9s linear infinite; }
    .terminal-cursor { animation: cursor-blink 0.9s step-end infinite; }
    .steam-anim { animation: steam-rise 2.8s ease-in-out infinite; }
  </style>

  <!-- Ambient Glow Background -->
  <circle cx="200" cy="170" r="140" fill="url(#desk-glow)" />

  <!-- The Desk base -->
  <path d="M 40,240 L 360,240 L 380,265 L 20,265 Z" fill="#0d082d" stroke="#bd00ff" stroke-width="2" />
  
  <!-- Glowing Desk Mat -->
  <path d="M 70,240 L 330,240 L 340,258 L 60,258 Z" fill="#140b2e" stroke="#00f2fe" stroke-width="1.5" class="glow-cyan" />

  <!-- Left Main Monitor -->
  <!-- stand -->
  <path d="M 120,190 L 125,240 L 135,240 L 130,190 Z" fill="#140b2e" stroke="#bd00ff" stroke-width="1" />
  <!-- bezel -->
  <rect x="60" y="90" width="130" height="100" rx="6" fill="#05030f" stroke="#bd00ff" stroke-width="2" />
  <!-- screen -->
  <rect x="65" y="95" width="120" height="90" rx="3" fill="#0a051b" />
  
  <!-- Animated Code Lines on Left Monitor -->
  <g stroke="url(#neon-cyan-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="75" y1="110" x2="165" y2="110" class="code-scroll-1" />
    <line x1="75" y1="120" x2="140" y2="120" class="code-scroll-2" />
    <line x1="85" y1="130" x2="175" y2="130" class="code-scroll-1" />
    <line x1="85" y1="140" x2="150" y2="140" class="code-scroll-2" />
    <line x1="95" y1="150" x2="135" y2="150" class="code-scroll-1" />
    <line x1="75" y1="160" x2="160" y2="160" class="code-scroll-2" />
  </g>
  <!-- Blinking Cursor -->
  <rect x="163" y="157" width="6" height="5" fill="#00f2fe" class="terminal-cursor glow-cyan" />

  <!-- Right Slanted Monitor (3D Perspective) -->
  <!-- stand -->
  <path d="M 270,185 L 265,240 L 275,240 L 280,185 Z" fill="#140b2e" stroke="#bd00ff" stroke-width="1" />
  <!-- slanted bezel -->
  <path d="M 205,80 L 325,95 L 325,185 L 205,170 Z" fill="#05030f" stroke="#00f2fe" stroke-width="2" class="glow-cyan" />
  <!-- screen -->
  <path d="M 210,86 L 320,100 L 320,180 L 210,165 Z" fill="#0a051b" />
  
  <!-- Cyber Data / Chart Visual on Right screen -->
  <path d="M 220,150 L 240,120 L 260,135 L 280,105 L 300,125" fill="none" stroke="url(#neon-pink-grad)" stroke-width="2" stroke-linecap="round" class="glow-pink" />
  <g opacity="0.4" stroke="#00f2fe" stroke-width="0.75">
    <line x1="220" y1="155" x2="310" y2="167" />
    <line x1="250" y1="90" x2="250" y2="160" />
    <line x1="280" y1="94" x2="280" y2="164" />
  </g>
  <!-- Pulse points on chart -->
  <circle cx="280" cy="105" r="3.5" fill="#ff007f" class="glow-pink" style="animation: pulse 2s infinite;" />
  <circle cx="240" cy="120" r="3" fill="#00f2fe" class="glow-cyan" style="animation: pulse 2s infinite 1s;" />

  <!-- Keyboard and Mouse -->
  <rect x="140" y="246" width="65" height="7" rx="1.5" fill="#140b2e" stroke="#bd00ff" stroke-width="1" />
  <ellipse cx="230" cy="250" rx="4.5" ry="3" fill="#140b2e" stroke="#00f2fe" stroke-width="1" />

  <!-- Hot Coffee Cup -->
  <rect x="90" y="231" width="11" height="11" rx="2" fill="#ff007f" />
  <path d="M 101,234 C 103.5,234 103.5,239 101,239" fill="none" stroke="#ff007f" stroke-width="1.5" />
  <!-- Steam animation -->
  <g stroke="#00f2fe" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 93,228 Q 95,224 93,220" class="steam-anim" />
    <path d="M 98,228 Q 100,225 98,221" class="steam-anim" style="animation-delay: 1.4s;" />
  </g>

  <!-- Developer Silhouette / Backside View -->
  <!-- chair back -->
  <path d="M 165,220 C 165,190 205,190 205,220 L 210,252 L 160,252 Z" fill="#05030f" stroke="#bd00ff" stroke-width="1.5" />
  <!-- programmer shoulders and head -->
  <path d="M 155,250 C 160,230 170,220 185,220 C 200,220 210,230 215,250 Z" fill="#0d082d" />
  <circle cx="185" cy="208" r="11" fill="#0d082d" />
  <!-- headphone band -->
  <path d="M 172,207 C 172,192 198,192 198,207" fill="none" stroke="#00f2fe" stroke-width="2.5" class="glow-cyan" />
  <!-- ear cups -->
  <rect x="171" y="202" width="4" height="9" rx="2" fill="#ff007f" class="glow-pink" />
  <rect x="195" y="202" width="4" height="9" rx="2" fill="#ff007f" class="glow-pink" />

  <!-- Floating Tech Stack Icons -->
  <g class="float-1">
    <!-- C++ Icon Representation -->
    <g transform="translate(30, 70)">
      <circle cx="15" cy="15" r="16" fill="#140b2e" stroke="#00f2fe" stroke-width="1.5" class="glow-cyan" />
      <text x="15" y="20" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="bold" font-size="11" text-anchor="middle">C++</text>
    </g>
    <!-- Python Brackets -->
    <g transform="translate(325, 60)">
      <circle cx="15" cy="15" r="16" fill="#140b2e" stroke="#bd00ff" stroke-width="1.5" />
      <text x="15" y="21" fill="#00f2fe" font-family="monospace" font-weight="bold" font-size="16" text-anchor="middle">&lt;/&gt;</text>
    </g>
    <!-- JS Icon -->
    <g transform="translate(330, 160)">
      <circle cx="15" cy="15" r="16" fill="#140b2e" stroke="#ff007f" stroke-width="1.5" class="glow-pink" />
      <text x="15" y="20" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="bold" font-size="12" text-anchor="middle">JS</text>
    </g>
  </g>

  <g class="float-2">
    <!-- Java Icon -->
    <g transform="translate(35, 170)">
      <circle cx="15" cy="15" r="16" fill="#140b2e" stroke="#bd00ff" stroke-width="1.5" />
      <text x="15" y="20" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Java</text>
    </g>
    <!-- Python Snake Icon (symbolic) -->
    <g transform="translate(195, 30)">
      <circle cx="15" cy="15" r="16" fill="#140b2e" stroke="#00f2fe" stroke-width="1.5" class="glow-cyan" />
      <text x="15" y="20" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Py</text>
    </g>
  </g>
</svg>
