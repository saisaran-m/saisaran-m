<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes draw-chart {
      0% { stroke-dashoffset: 200; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -200; }
    }
    @keyframes code-typing {
      0%, 100% { width: 0; }
      50% { width: 140px; }
    }
    @keyframes code-typing-2 {
      0%, 100% { width: 0; }
      50% { width: 180px; }
    }
    @keyframes pulse-activity {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes float-icon {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    
    .cursor { animation: cursor-blink 0.9s step-end infinite; }
    .chart-line { stroke-dasharray: 200; animation: draw-chart 8s linear infinite; }
    .pulse-dot { animation: pulse-activity 2s ease-in-out infinite; }
    .float-card { animation: float-icon 4s ease-in-out infinite; }
    
    /* Code typing animation bar */
    .type-bar-1 { animation: code-typing 4s ease-in-out infinite; }
    .type-bar-2 { animation: code-typing-2 5s ease-in-out infinite; }
  </style>

  <!-- ==================== MAIN TERMINAL WINDOW ==================== -->
  <!-- Outer Window Shadow & Border -->
  <rect x="10" y="10" width="430" height="280" rx="12" fill="#060312" stroke="#bd00ff" stroke-width="2.5" class="glow-pink" />
  
  <!-- Title Bar -->
  <path d="M 10,22 Q 10,10 22,10 L 428,10 Q 440,10 440,22 L 440,42 L 10,42 Z" fill="#0d0824" stroke="#bd00ff" stroke-width="0" />
  <line x1="10" y1="42" x2="440" y2="42" stroke="#bd00ff" stroke-width="1.5" />

  <!-- macOS Window Controls (Red, Yellow, Green Dots) -->
  <circle cx="32" cy="26" r="6" fill="#ff5f56" />
  <circle cx="52" cy="26" r="6" fill="#ffbd2e" />
  <circle cx="72" cy="26" r="6" fill="#27c93f" />

  <!-- Terminal Title -->
  <text x="225" y="30" fill="#ffffff" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" text-anchor="middle" opacity="0.8">
    saisaran-m@developer-terminal:~
  </text>

  <!-- ==================== LEFT PANEL: CODE EDITOR ==================== -->
  <!-- Line Numbers -->
  <g fill="#4a3e72" font-family="Consolas, Monaco, monospace" font-size="11" text-anchor="end" opacity="0.7">
    <text x="35" y="75">1</text>
    <text x="35" y="95">2</text>
    <text x="35" y="115">3</text>
    <text x="35" y="135">4</text>
    <text x="35" y="155">5</text>
    <text x="35" y="175">6</text>
    <text x="35" y="195">7</text>
    <text x="35" y="215">8</text>
  </g>

  <!-- Code Content -->
  <g font-family="Consolas, Monaco, monospace" font-size="12" font-weight="bold">
    <!-- Line 1: const developer = { -->
    <text x="50" y="75" fill="#ff007f">const</text>
    <text x="92" y="75" fill="#ffffff">developer</text>
    <text x="160" y="75" fill="#00f2fe">=</text>
    <text x="175" y="75" fill="#ffffff">{</text>

    <!-- Line 2: name: "Saisaran M", -->
    <text x="70" y="95" fill="#00f2fe">name</text>
    <text x="98" y="95" fill="#ffffff">:</text>
    <text x="110" y="95" fill="#ffb380">"Saisaran M"</text>
    <text x="195" y="95" fill="#ffffff">,</text>

    <!-- Line 3: role: "Full Stack Dev", -->
    <text x="70" y="115" fill="#00f2fe">role</text>
    <text x="98" y="115" fill="#ffffff">:</text>
    <text x="110" y="115" fill="#ffb380">"Full Stack Dev"</text>
    <text x="215" y="115" fill="#ffffff">,</text>

    <!-- Line 4: skills: ["C++", "Java", "Py", "JS"], -->
    <text x="70" y="135" fill="#00f2fe">skills</text>
    <text x="112" y="135" fill="#ffffff">:</text>
    <text x="125" y="135" fill="#ffffff">[</text>
    <text x="132" y="135" fill="#27c93f">"C++"</text>
    <text x="168" y="135" fill="#ffffff">,</text>
    <text x="178" y="135" fill="#27c93f">"Java"</text>
    <text x="220" y="135" fill="#ffffff">,</text>
    <text x="230" y="135" fill="#27c93f">"JS"</text>
    <text x="255" y="135" fill="#ffffff">]</text>
    <text x="262" y="135" fill="#ffffff">,</text>

    <!-- Line 5: focus: "Scalable Systems" -->
    <text x="70" y="155" fill="#00f2fe">focus</text>
    <text x="105" y="155" fill="#ffffff">:</text>
    <text x="118" y="155" fill="#ffb380">"Scalable Systems"</text>

    <!-- Line 6: }; -->
    <text x="50" y="175" fill="#ffffff">};</text>

    <!-- Line 7: > compiling workspace... -->
    <text x="50" y="200" fill="#27c93f" opacity="0.85" font-size="11">&gt; compiling workspace...</text>

    <!-- Line 8: > status: active _ -->
    <text x="50" y="225" fill="#00f2fe" font-size="12">&gt; status: active</text>
    <rect x="156" y="214" width="7" height="12" fill="#00f2fe" class="cursor" />
  </g>

  <!-- ==================== PANEL DIVIDER ==================== -->
  <line x1="280" y1="42" x2="280" y2="290" stroke="#bd00ff" stroke-dasharray="4 4" stroke-width="1.5" opacity="0.6" />

  <!-- ==================== RIGHT PANEL: SYSTEM METRICS ==================== -->
  <!-- Performance Section -->
  <text x="295" y="68" fill="#ffffff" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" opacity="0.9">
    SYSTEM HEALTH
  </text>
  
  <!-- CPU Load Bar -->
  <text x="295" y="93" fill="#ff007f" font-family="Consolas, monospace" font-size="10">CPU</text>
  <rect x="325" y="85" width="100" height="8" rx="4" fill="#140b2e" stroke="#ff007f" stroke-width="0.75" />
  <rect x="325" y="85" width="75" height="8" rx="4" fill="url(#neon-pink)" class="glow-pink" />
  <linearGradient id="neon-pink" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#bd00ff" />
    <stop offset="100%" stop-color="#ff007f" />
  </linearGradient>

  <!-- MEMORY Load Bar -->
  <text x="295" y="113" fill="#00f2fe" font-family="Consolas, monospace" font-size="10">MEM</text>
  <rect x="325" y="105" width="100" height="8" rx="4" fill="#140b2e" stroke="#00f2fe" stroke-width="0.75" />
  <rect x="325" y="105" width="55" height="8" rx="4" fill="url(#neon-cyan)" class="glow-cyan" />
  <linearGradient id="neon-cyan" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0066ff" />
    <stop offset="100%" stop-color="#00f2fe" />
  </linearGradient>

  <!-- Performance Wave Graph -->
  <rect x="295" y="135" width="130" height="90" rx="6" fill="#080417" stroke="#bd00ff" stroke-width="1" opacity="0.8" />
  <path d="M 297,195 Q 315,160 330,190 T 360,170 T 390,200 T 423,165" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" class="glow-cyan chart-line" />
  
  <!-- Live Pulsing activity dot -->
  <circle cx="423" cy="165" r="3.5" fill="#ff007f" class="glow-pink pulse-dot" />

  <!-- Metric Labels -->
  <text x="302" y="240" fill="#27c93f" font-family="Consolas, monospace" font-size="10">SYS LOAD: STABLE</text>
  <text x="302" y="255" fill="#ffffff" font-family="Consolas, monospace" font-size="10" opacity="0.6">STREAK STATUS: ON</text>
</svg>
