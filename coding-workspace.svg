<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Clip paths to keep animations inside screen boundaries -->
    <clipPath id="left-screen-clip">
      <polygon points="94,114 156,91 156,159 94,182" />
    </clipPath>
    <clipPath id="right-screen-clip">
      <polygon points="179,85 246,101 246,172 179,155" />
    </clipPath>
  </defs>

  <style>
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes typing-effect {
      0% { stroke-dashoffset: 80; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -80; }
    }
    @keyframes wave-move {
      0% { transform: translateX(0px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes pulse-point {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    .cursor { animation: cursor-blink 0.8s step-end infinite; }
    .code-line { stroke-dasharray: 20 60; animation: typing-effect 6s linear infinite; }
    .chart-wave { stroke-dasharray: 40; animation: wave-move 4s linear infinite; }
    .glow-dot { animation: pulse-point 2s ease-in-out infinite; transform-origin: center; }
  </style>

  <!-- ==================== BACKGROUND & WALL ==================== -->
  <!-- Clean white background matching the image -->
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <!-- Back wall line (light gray) -->
  <line x1="0" y1="65" x2="400" y2="65" stroke="#d5dbe1" stroke-width="1.5" />

  <!-- ==================== FLOOR & SHADOWS ==================== -->
  <!-- Dark teal floor block at the bottom -->
  <path d="M 0,240 L 120,285 L 400,165 L 400,300 L 0,300 Z" fill="#00354b" />
  
  <!-- Thin gray edge line for the desk -->
  <path d="M 0,240 L 120,285 L 400,165" fill="none" stroke="#d5dbe1" stroke-width="2" />

  <!-- ==================== LEFT MONITOR (CODE) ==================== -->
  <!-- Monitor Base -->
  <polygon points="110,135 125,129 135,133 120,139" fill="#10222a" />
  <!-- Stand -->
  <polygon points="120,137 120,117 126,114 126,134" fill="#1c323f" />
  <!-- Bezel -->
  <polygon points="90,110 160,85 160,165 90,190" fill="#10222a" />
  <!-- Screen -->
  <polygon points="94,114 156,91 156,159 94,182" fill="#061a24" />
  
  <!-- Animated Code Lines (Clipped) -->
  <g clip-path="url(#left-screen-clip)" stroke="#00bcd4" stroke-width="2" stroke-linecap="round" opacity="0.95">
    <line x1="100" y1="122" x2="150" y2="99" class="code-line" />
    <line x1="100" y1="130" x2="140" y2="112" class="code-line" style="animation-delay: 1.2s;" />
    <line x1="105" y1="139" x2="150" y2="119" class="code-line" style="animation-delay: 2.4s;" />
    <line x1="105" y1="147" x2="140" y2="131" class="code-line" style="animation-delay: 3.6s;" />
    <line x1="110" y1="156" x2="145" y2="140" class="code-line" style="animation-delay: 4.8s;" />
  </g>
  <!-- Blinking Cursor -->
  <polygon points="112,159 116,157 116,161 112,163" fill="#00bcd4" class="cursor" />

  <!-- ==================== RIGHT MONITOR (DASHBOARD) ==================== -->
  <!-- Monitor Base -->
  <polygon points="195,103 210,97 220,101 205,107" fill="#10222a" />
  <!-- Stand -->
  <polygon points="205,105 205,85 211,82 211,102" fill="#1c323f" />
  <!-- Bezel -->
  <polygon points="175,80 250,98 250,178 175,160" fill="#10222a" />
  <!-- Screen -->
  <polygon points="179,85 246,101 246,172 179,155" fill="#0e2936" />
  
  <!-- Dashboard Content (Clipped) -->
  <g clip-path="url(#right-screen-clip)">
    <!-- Grid -->
    <line x1="179" y1="120" x2="246" y2="138" stroke="#143c4e" stroke-width="0.75" />
    <line x1="179" y1="135" x2="246" y2="153" stroke="#143c4e" stroke-width="0.75" />
    <line x1="205" y1="80" x2="205" y2="175" stroke="#143c4e" stroke-width="0.75" />
    <!-- Graph Lines -->
    <path d="M 175,130 Q 195,95 215,130 T 255,105" fill="none" stroke="#00bcd4" stroke-width="2" stroke-linecap="round" class="chart-wave" />
    <path d="M 175,140 Q 200,115 220,140 T 255,120" fill="none" stroke="#ffb380" stroke-width="1.5" opacity="0.6" />
    <!-- Node -->
    <circle cx="215" cy="130" r="2.5" fill="#ffb380" class="glow-dot" />
  </g>

  <!-- ==================== DESK ACCESSORIES ==================== -->
  <!-- Keyboard -->
  <polygon points="135,163 195,137 205,145 145,171" fill="#10222a" stroke="#1c323f" stroke-width="0.5" />
  <!-- Mouse -->
  <ellipse cx="225" cy="160" rx="3" ry="5" fill="#10222a" transform="rotate(25, 225, 160)" />
  <!-- Smartphone -->
  <polygon points="120,190 135,183 141,191 126,198" fill="#10222a" />
  <!-- Smartphone Screen -->
  <polygon points="122,191 133,186 139,190 128,195" fill="#00bcd4" opacity="0.8" />

  <!-- ==================== PROGRAMMER (BACK-RIGHT VIEW) ==================== -->
  <!-- Chair Backrest -->
  <path d="M 235,225 C 235,190 275,180 280,215 L 290,245 L 245,255 Z" fill="#001c27" stroke="#10222a" stroke-width="1" />
  
  <!-- Torso & Shoulders -->
  <path d="M 235,265 C 240,225 255,210 275,210 C 295,210 310,225 320,265 Z" fill="#0b2d3f" />
  <!-- Collar -->
  <path d="M 270,210 C 272,218 288,218 290,210 Z" fill="#05141c" />

  <!-- Left Arm -->
  <path d="M 240,240 Q 200,220 175,195" fill="none" stroke="#0b2d3f" stroke-width="12" stroke-linecap="round" />
  <path d="M 175,195 L 166,187" stroke="#d3b499" stroke-width="5" stroke-linecap="round" /> <!-- Hand -->

  <!-- Right Arm -->
  <path d="M 295,235 Q 285,205 238,178" fill="none" stroke="#0b2d3f" stroke-width="12" stroke-linecap="round" />
  <path d="M 238,178 L 230,172" stroke="#d3b499" stroke-width="5" stroke-linecap="round" /> <!-- Hand -->

  <!-- Head & Hair -->
  <circle cx="280" cy="190" r="12.5" fill="#d3b499" />
  <path d="M 268,190 C 265,178 275,170 285,172 C 295,174 293,185 293,192 C 293,192 288,186 280,185 C 274,184 268,190 268,190 Z" fill="#10222a" />

  <!-- Headphones -->
  <path d="M 269,191 C 269,177 291,177 291,191" fill="none" stroke="#00bcd4" stroke-width="2.5" />
  <ellipse cx="268" cy="191" rx="2" ry="5" fill="#10222a" />
  <ellipse cx="291" cy="191" rx="2.5" ry="5.5" fill="#10222a" />
</svg>
