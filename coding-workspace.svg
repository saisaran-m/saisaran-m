<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bg-glow" cx="70%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0a051b" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#bd00ff" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-cyan-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-light {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.95; }
    }
    @keyframes code-flow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes graph-float {
      0%, 100% { transform: translateY(0px) scaleY(1); }
      50% { transform: translateY(-2px) scaleY(1.05); }
    }
    @keyframes particle-float {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      50% { transform: translateY(-8px) translateX(4px); opacity: 0.7; }
    }
    @keyframes keyboard-press {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .glow-cyan { filter: url(#glow-cyan-filter); }
    .glow-pink { filter: url(#glow-pink-filter); }
    .anim-pulse { animation: pulse-light 2.5s ease-in-out infinite; }
    .anim-code { stroke-dasharray: 20 80; animation: code-flow 6s linear infinite; }
    .anim-code-reverse { stroke-dasharray: 30 70; animation: code-flow 8s linear infinite reverse; }
    .anim-graph { animation: graph-float 4s ease-in-out infinite; transform-origin: center bottom; }
    .anim-particle { animation: particle-float 5s ease-in-out infinite; }
    .anim-keyboard { animation: keyboard-press 0.8s ease-in-out infinite; }
  </style>

  <!-- Ambient background glow -->
  <rect width="100%" height="100%" fill="#0a051b" />
  <circle cx="280" cy="200" r="150" fill="url(#bg-glow)" />

  <!-- ==================== DESK SECTION (ISOMETRIC) ==================== -->
  <!-- Back wall boundary line -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="#1f1a3a" stroke-width="1.5" />
  
  <!-- Desk surface (slanted isometric plane) -->
  <!-- Left corner: (10, 190), Top corner: (270, 90), Right corner: (390, 170), Bottom corner: (130, 270) -->
  <polygon points="10,190 270,90 390,170 130,270" fill="#0f0926" stroke="#bd00ff" stroke-width="2" />
  
  <!-- Desk edge thickness -->
  <polygon points="10,190 130,270 130,276 10,196" fill="#080417" />
  <polygon points="130,270 390,170 390,176 130,276" fill="#080417" />
  <line x1="130" y1="270" x2="130" y2="276" stroke="#bd00ff" stroke-width="2" />
  <line x1="10" y1="190" x2="130" y2="270" stroke="#bd00ff" stroke-width="2" />
  <line x1="130" y1="270" x2="390" y2="170" stroke="#bd00ff" stroke-width="2" />

  <!-- Glowing Desk Mat -->
  <polygon points="60,190 240,110 320,163 140,243" fill="#140b2e" stroke="#00f2fe" stroke-width="1.2" class="glow-cyan" />

  <!-- ==================== MONITOR LEFT (CODE SCREEN) ==================== -->
  <!-- Monitor Base -->
  <polygon points="120,150 140,142 150,147 130,155" fill="#0a051b" stroke="#bd00ff" stroke-width="1" />
  <!-- Stand -->
  <path d="M 132,148 L 132,128 L 138,125 L 138,145 Z" fill="#080417" stroke="#bd00ff" stroke-width="0.75" />
  <!-- Screen Bezel (Tilted slightly right, facing programmer) -->
  <polygon points="90,125 170,95 170,165 90,195" fill="#05030f" stroke="#bd00ff" stroke-width="1.8" />
  <!-- Screen Surface -->
  <polygon points="95,129 165,101 165,159 95,187" fill="#0a051b" />
  
  <!-- Scrolling Code Lines -->
  <g stroke="url(#neon-cyan)" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <line x1="105" y1="133" x2="155" y2="113" class="anim-code" />
    <line x1="105" y1="141" x2="140" y2="127" class="anim-code-reverse" />
    <line x1="110" y1="150" x2="160" y2="130" class="anim-code" />
    <line x1="110" y1="158" x2="145" y2="144" class="anim-code-reverse" />
    <line x1="115" y1="167" x2="150" y2="153" class="anim-code" />
    <line x1="105" y1="174" x2="135" y2="162" class="anim-code-reverse" />
  </g>

  <!-- ==================== MONITOR RIGHT (GRAPH SCREEN) ==================== -->
  <!-- Monitor Base -->
  <polygon points="200,118 220,110 230,115 210,123" fill="#0a051b" stroke="#00f2fe" stroke-width="1" />
  <!-- Stand -->
  <path d="M 212,116 L 212,96 L 218,93 L 218,113 Z" fill="#080417" stroke="#00f2fe" stroke-width="0.75" />
  <!-- Screen Bezel (Tilted slightly left, facing programmer) -->
  <polygon points="180,95 260,115 260,185 180,165" fill="#05030f" stroke="#00f2fe" stroke-width="1.8" class="glow-cyan" />
  <!-- Screen Surface -->
  <polygon points="185,101 255,119 255,179 185,161" fill="#0a051b" />
  
  <!-- Grid Lines inside screen -->
  <g stroke="#201a4c" stroke-width="0.5">
    <line x1="185" y1="131" x2="255" y2="149" />
    <line x1="185" y1="146" x2="255" y2="164" />
    <line x1="205" y1="106" x2="205" y2="166" />
    <line x1="230" y1="112" x2="230" y2="172" />
  </g>
  <!-- Moving Wave Graph -->
  <path d="M 190,145 Q 205,120 220,140 T 250,125" fill="none" stroke="url(#neon-pink)" stroke-width="2" stroke-linecap="round" class="glow-pink anim-graph" />
  <!-- Pulsing Data Nodes -->
  <circle cx="220" cy="140" r="2.5" fill="#00f2fe" class="glow-cyan anim-pulse" />
  <circle cx="205" cy="131" r="2" fill="#ff007f" class="glow-pink anim-pulse" />

  <!-- ==================== KEYBOARD, MOUSE, MOBILE ==================== -->
  <!-- Keyboard (Slanted on desk mat) -->
  <polygon points="135,183 195,157 210,167 150,193" fill="#140b2e" stroke="#bd00ff" stroke-width="1.2" class="anim-keyboard" />
  <!-- Mouse -->
  <ellipse cx="230" cy="180" rx="3.5" ry="5.5" fill="#140b2e" stroke="#00f2fe" stroke-width="0.75" transform="rotate(25, 230, 180)" />
  <!-- Phone -->
  <polygon points="120,210 135,203 143,213 128,220" fill="#05030f" stroke="#00f2fe" stroke-width="0.75" />
  <polygon points="122,211 133,206 140,212 129,217" fill="#00f2fe" opacity="0.6" class="anim-pulse" />

  <!-- ==================== PROGRAMMER SECTION (BACK-RIGHT VIEW) ==================== -->
  <!-- Chair Backrest -->
  <path d="M 235,245 C 235,210 275,200 280,235 L 290,265 L 245,275 Z" fill="#080417" stroke="#bd00ff" stroke-width="1.5" />
  
  <!-- Shoulder & Torso (Tilted body) -->
  <!-- Back torso -->
  <path d="M 235,285 C 240,245 255,230 275,230 C 295,230 310,245 320,285 Z" fill="#0f0926" />
  <!-- Shirt collar shadow -->
  <path d="M 270,230 C 272,238 288,238 290,230 Z" fill="#05030f" />
  
  <!-- Left Arm (extending to keyboard) -->
  <path d="M 240,260 Q 200,240 175,215" fill="none" stroke="#0f0926" stroke-width="14" stroke-linecap="round" />
  <!-- Sleeve edge -->
  <circle cx="178" cy="218" r="6" fill="#bd00ff" opacity="0.7" />
  <!-- Left Hand -->
  <path d="M 175,215 L 165,205" stroke="#ffb380" stroke-width="5.5" stroke-linecap="round" />
  
  <!-- Right Arm (extending to mouse) -->
  <path d="M 295,255 Q 285,225 242,198" fill="none" stroke="#0f0926" stroke-width="14" stroke-linecap="round" />
  <!-- Sleeve edge -->
  <circle cx="245" cy="201" r="6" fill="#bd00ff" opacity="0.7" />
  <!-- Right Hand (resting on mouse) -->
  <path d="M 242,198 L 234,192" stroke="#ffb380" stroke-width="5.5" stroke-linecap="round" />

  <!-- Head -->
  <circle cx="280" cy="210" r="13" fill="#ffb380" />
  <!-- Hair (spiky back-right view) -->
  <path d="M 268,210 C 265,198 275,190 285,192 C 295,194 293,205 293,212 C 293,212 288,206 280,205 C 274,204 268,210 268,210 Z" fill="#080417" />
  
  <!-- Headphones (Isometric view) -->
  <!-- Headband -->
  <path d="M 269,211 C 269,197 291,197 291,211" fill="none" stroke="url(#neon-cyan)" stroke-width="3" class="glow-cyan" />
  <!-- Left Cup (hidden behind head Mostly, but side visible) -->
  <ellipse cx="268" cy="211" rx="2.5" ry="5.5" fill="#ff007f" class="glow-pink anim-pulse" />
  <!-- Right Cup (Fully visible on right side of head) -->
  <ellipse cx="291" cy="211" rx="3.5" ry="6.5" fill="#ff007f" class="glow-pink anim-pulse" />

  <!-- ==================== FLOATING TECH ICONS ==================== -->
  <g class="anim-particle">
    <!-- C++ -->
    <g transform="translate(45, 55)">
      <circle cx="15" cy="15" r="15" fill="#140b2e" stroke="#00f2fe" stroke-width="1.2" class="glow-cyan" />
      <text x="15" y="19" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="9" text-anchor="middle">C++</text>
    </g>
    <!-- Java -->
    <g transform="translate(30, 130)">
      <circle cx="15" cy="15" r="15" fill="#140b2e" stroke="#bd00ff" stroke-width="1.2" />
      <text x="15" y="19" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="9" text-anchor="middle">Java</text>
    </g>
  </g>

  <g class="anim-particle" style="animation-delay: 2s;">
    <!-- Python (Py) -->
    <g transform="translate(230, 30)">
      <circle cx="15" cy="15" r="15" fill="#140b2e" stroke="#00f2fe" stroke-width="1.2" class="glow-cyan" />
      <text x="15" y="19" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">Py</text>
    </g>
    <!-- Code Bracket </> -->
    <g transform="translate(340, 50)">
      <circle cx="15" cy="15" r="15" fill="#140b2e" stroke="#bd00ff" stroke-width="1.2" />
      <text x="15" y="20" fill="#00f2fe" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">&lt;/&gt;</text>
    </g>
    <!-- JS -->
    <g transform="translate(345, 135)">
      <circle cx="15" cy="15" r="15" fill="#140b2e" stroke="#ff007f" stroke-width="1.2" class="glow-pink" />
      <text x="15" y="19" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">JS</text>
    </g>
  </g>
</svg>
