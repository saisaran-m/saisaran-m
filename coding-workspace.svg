<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Screen content mask -->
    <clipPath id="left-screen-clip">
      <polygon points="95,140 155,112 155,173 95,202" />
    </clipPath>
    <clipPath id="right-screen-clip">
      <polygon points="185,111 245,129 245,189 185,170" />
    </clipPath>
  </defs>

  <style>
    @keyframes cursor {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes typing {
      0% { stroke-dashoffset: 80; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -80; }
    }
    @keyframes wave {
      0% { transform: translateX(0px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    .cursor { animation: cursor 0.8s step-end infinite; }
    .type-line { stroke-dasharray: 20 60; animation: typing 5s linear infinite; }
    .chart-line { stroke-dasharray: 40; animation: wave 4s linear infinite; }
    .pulse { animation: pulse-dot 2s ease-in-out infinite; transform-origin: center; }
  </style>

  <!-- ==================== BACKGROUND & ENVIRONMENT ==================== -->
  <!-- Dark floor / lower background -->
  <rect width="100%" height="100%" fill="#0d1117" />
  
  <!-- Desk under-shadow (Teal shape from the image) -->
  <polygon points="0,170 240,110 400,170 400,300 0,300" fill="#073042" />

  <!-- White Desk Surface (Slanted exactly like the image) -->
  <polygon points="0,170 240,110 400,170 120,245" fill="#ffffff" />
  
  <!-- Desk edge (gives 3D thickness) -->
  <polygon points="120,245 400,170 400,174 120,249" fill="#e0e0e0" />
  <polygon points="0,170 120,245 120,249 0,174" fill="#d5d5d5" />

  <!-- ==================== LEFT MONITOR (CODE) ==================== -->
  <!-- Monitor Base -->
  <polygon points="120,150 135,143 145,148 130,155" fill="#14232c" />
  <!-- Stand -->
  <polygon points="130,152 130,132 136,129 136,149" fill="#1c323f" />
  <!-- Bezel -->
  <polygon points="90,135 160,105 160,180 90,210" fill="#14232c" />
  <!-- Screen -->
  <polygon points="95,140 155,112 155,173 95,202" fill="#0c4b64" />
  
  <!-- Code Content on Left Screen (Clipped) -->
  <g clip-path="url(#left-screen-clip)" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="100" y1="148" x2="150" y2="125" class="type-line" />
    <line x1="100" y1="156" x2="140" y2="138" class="type-line" style="animation-delay: 1s;" />
    <line x1="105" y1="165" x2="150" y2="145" class="type-line" style="animation-delay: 2s;" />
    <line x1="105" y1="173" x2="140" y2="157" class="type-line" style="animation-delay: 3s;" />
    <line x1="110" y1="182" x2="145" y2="166" class="type-line" style="animation-delay: 4s;" />
  </g>
  <!-- Blinking Cursor -->
  <polygon points="112,185 116,183 116,187 112,189" fill="#00f2fe" class="cursor" />

  <!-- ==================== RIGHT MONITOR (DASHBOARD) ==================== -->
  <!-- Monitor Base -->
  <polygon points="200,118 215,111 225,116 210,123" fill="#14232c" />
  <!-- Stand -->
  <polygon points="210,120 210,100 216,97 216,117" fill="#1c323f" />
  <!-- Bezel -->
  <polygon points="180,105 250,125 250,195 180,175" fill="#14232c" />
  <!-- Screen -->
  <polygon points="185,111 245,129 245,189 185,170" fill="#0c4b64" />
  
  <!-- Dashboard Content (Clipped) -->
  <g clip-path="url(#right-screen-clip)">
    <!-- Grid -->
    <line x1="185" y1="140" x2="245" y2="158" stroke="#105f7e" stroke-width="0.5" />
    <line x1="185" y1="155" x2="245" y2="173" stroke="#105f7e" stroke-width="0.5" />
    <line x1="210" y1="110" x2="210" y2="185" stroke="#105f7e" stroke-width="0.5" />
    <!-- Graph Lines -->
    <path d="M 180,150 Q 200,120 220,150 T 260,130" fill="none" stroke="#00f2fe" stroke-width="1.8" class="chart-line" />
    <path d="M 180,160 Q 205,140 225,160 T 260,145" fill="none" stroke="#ffb380" stroke-width="1.5" opacity="0.7" />
    <!-- Pulsing Node -->
    <circle cx="220" cy="150" r="3" fill="#ffb380" class="pulse" />
  </g>

  <!-- ==================== DESK ACCESSORIES ==================== -->
  <!-- Keyboard (Slanted on desk) -->
  <polygon points="135,183 195,157 205,165 145,191" fill="#14232c" stroke="#1c323f" stroke-width="0.5" />
  <!-- Mouse -->
  <ellipse cx="225" cy="180" rx="3" ry="5" fill="#14232c" transform="rotate(25, 225, 180)" />
  <!-- Smartphone -->
  <polygon points="120,210 135,203 141,211 126,218" fill="#14232c" />

  <!-- ==================== PROGRAMMER (BACK-RIGHT VIEW) ==================== -->
  <!-- Office Chair -->
  <path d="M 235,245 C 235,210 275,200 280,235 L 290,265 L 245,275 Z" fill="#081c24" stroke="#14232c" stroke-width="1" />
  
  <!-- Torso & Shoulders -->
  <path d="M 235,285 C 240,245 255,230 275,230 C 295,230 310,245 320,285 Z" fill="#0b2d3f" />
  <path d="M 270,230 C 272,238 288,238 290,230 Z" fill="#071d29" /> <!-- Collar -->

  <!-- Left Arm (Typing) -->
  <path d="M 240,260 Q 200,240 175,215" fill="none" stroke="#0b2d3f" stroke-width="12" stroke-linecap="round" />
  <path d="M 175,215 L 166,207" stroke="#e0a98c" stroke-width="5" stroke-linecap="round" /> <!-- Hand -->

  <!-- Right Arm (Mouse) -->
  <path d="M 295,255 Q 285,225 238,198" fill="none" stroke="#0b2d3f" stroke-width="12" stroke-linecap="round" />
  <path d="M 238,198 L 230,192" stroke="#e0a98c" stroke-width="5" stroke-linecap="round" /> <!-- Hand -->

  <!-- Head & Hair -->
  <circle cx="280" cy="210" r="12.5" fill="#e0a98c" />
  <path d="M 268,210 C 265,198 275,190 285,192 C 295,194 293,205 293,212 C 293,212 288,206 280,205 C 274,204 268,210 268,210 Z" fill="#14232c" />

  <!-- Headphones -->
  <path d="M 269,211 C 269,197 291,197 291,211" fill="none" stroke="#00a8cc" stroke-width="2.5" />
  <ellipse cx="268" cy="211" rx="2" ry="5" fill="#14232c" />
  <ellipse cx="291" cy="211" rx="2.5" ry="5.5" fill="#14232c" />
</svg>
